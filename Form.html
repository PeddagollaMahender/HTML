<html>
    <head>
        <title> Wellcome to html</title>
    </head>
    <body>
        <h3 style="text-align: center"> Create a froms by using html code</h3>
    <hr>
    <br>

    <form>
        <fieldset style="width: 50%">
            <legend style="text-align: center;">Form</legend>
    <div>
        <label>Name</label>
        <input type="text"  placeholder="Enter Name" required  >
    </div>
    <br>
    <div>
        <label>Mobileno: </label>
        <input type="number" >
    </div>
    <br>
    <div>
        <label>Email:</label>
        <input type="email" placeholder="Enter Email" required >
    </div>
    <br>
    <div>
        <label>City</label>
        <select>
        <option>Select city</option>
        <option>Hyderbad</option>
        <option>Chennai</option>
        <option>Banglore</option>
        <option>Pune</option>
        <option>madras</option>
        </select>
    </div>
    <br>
    <div>
        <label>Gender</label>
        <input type="radio" name="gender" disabled>Male
        <input type="radio" name="gender" checked>Female
    </div>
    <br>

    <div>
        <label> Choose City</label>
        <input type="checkbox" checked>Hyderabad
        <input type="checkbox" disabled>Banglore
        <input type="checkbox">Chennai
        <input type="checkbox">Pune
        <input type="checkbox">Madras
    </div>

    <br>
    <div>
        <label>DOB</label>
        <input type="date">
    </div>

    <br>
    <div>
        <label>Time</label>
        <input type="time">
    </div>

    <br>
    <div>
    <label>Password</label>
    <input type="password">
    </div>

    <br>
    <div>
        <label>upload file</label>
        <input type="file">
    </div>

    <br>
    <div>
        <label>Color</label>
        <input type="color">
    </div>

    <br>
    <div>
        <label>Range</label>
        <input type="range">
    </div>

    <br>
    <div>
    <label>Message</label>
    <textarea rows="10" cols="100"></textarea>
    </div>

    <br>
    <div>
        <label>Date&time</label>
        <input type="datetime-local">
    </div>

<br>
    <button>Submit</button>
    </fieldset>
</form>

</body>
</html>
